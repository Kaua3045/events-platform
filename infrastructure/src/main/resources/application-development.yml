application:
  name: events-platform
  instance: events-platform-01

redis:
  host: localhost
  port: 6379

server:
  tomcat:
    threads:
      worker: 10
      io: 2

spring:
  datasource: # change this configurations to your database
    url: jdbc:postgresql://localhost:5434/events-platform
    username: postgres
    password: 123456
  jpa:
    show-sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration

otel:
  exporter:
    otlp:
      endpoint: http://localhost:4318
      compression: gzip