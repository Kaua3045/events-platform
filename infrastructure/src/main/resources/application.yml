application:
  otel:
    memory-exporter: false
  cors:
    allowed-origins:
      - "*"
    allowed-headers:
      - "Authorization"
      - "Content-Type"
    allow-credentials: true
    max-age-preflight: 3600 # 1 hour
  rsa:
    key:
      path: ./keys/
  oauth:
    issuer: http://localhost:8081/api
    clients:
      default: # In future move this to DB
        client-id: default
        client-secret: default
        redirect-uri: http://localhost:8081/api/oauth2/callback/default
        public-client: false
        access-token-ttl: 1
        access-token-ttl-time-unit: MINUTES
        refresh-token-ttl: 1
        refresh-token-ttl-time-unit: DAYS
        authorities:
          - "read"
          - "write"

idempotency-key:
  storage:
    type: in-memory

logging:
  level:
    ROOT: WARN
    com.kaua.events.platform: DEBUG

server:
  port: 8081
  servlet:
    context-path: /api
  compression:
    enabled: true
    mime-types: text/html,text/xml,text/plain,text/css,text/javascript,application/javascript,application/json
    min-response-size: 1024
  tomcat:
    threads:
      worker: 64
      io: 4

spring:
  threads:
    virtual:
      enabled: true
  flyway:
    enabled: false
  datasource: # change this to your database, postgresql, mysql or other
    url: jdbc:postgresql://${postgres.url}/${postgres.schema}
    username: ${postgres.username}
    password: ${postgres.password}
    hikari:
      auto-commit: false
      connection-timeout: 250
      max-lifetime: 600000
      maximum-pool-size: 20
      minimum-idle: 10
      pool-name: master
  jpa:
    open-in-view: false
    show-sql: true
    hibernate:
      ddl-auto: none
    properties:
      "[hibernate.dialect]": org.hibernate.dialect.PostgreSQLDialect # change this to your database, postgresql, mysql or other
      "[hibernate.generate_statistics]": false
      "[hibernate.connection.provider_disables_autocommit]": true
      hibernate:
        jdbc:
          batch_size: 10
        order_inserts: true
        order_updates: true
  data:
    redis:
      database: 0
      host: ${redis.host}
      port: ${redis.port}
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${oauth.issuer}
          jwk-set-uri: ${oauth.issuer}/.well-known/jwks.json

# expondo rotas: /actuator/<health, info, metrics>
management:
  endpoints.web.exposure.include: "*"
  tracing:
    enabled: true
    sampling:
      probability: 1.0
  metrics:
    tags:
      application: ${application.name:template}
      instance: ${application.instance:template-01}
    export:
      otlp:
        step: 15s
    enable-all: true
    distribution:
      percentiles-histogram:
        http:
          server:
            requests: true
      slo[http.server.requests]: "25ms, 50ms, 100ms, 200ms, 400ms, 800ms, 1500ms"

otel: # https://medium.com/@yangli136/how-opentelemetry-is-integrated-with-spring-boot-application-7e309efc0011
  metrics:
    enabled: true
    export:
      interval: 10s
  propagation:
    enabled: true
  propagators:
    - b3
  traces:
    export:
      interval: 10s
  logs:
    enabled: true
    export:
      interval: 10s
#    exporter: none change to otlp
  resource:
    attributes:
      service:
        name: events-platform