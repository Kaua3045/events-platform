services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "8081:8081"
    environment:
      SPRING_PROFILES_ACTIVE: development
      PIX_CLIENT_ID: ${PIX_CLIENT_ID}
      PIX_CLIENT_SECRET: ${PIX_CLIENT_SECRET}
      PIX_WEBHOOK_URL: http://ngrok:4040
      # OpenTelemetry auto-instrumentation
      OTEL_SERVICE_NAME: events-platform
      OTEL_RESOURCE_ATTRIBUTES: deployment.environment=dev
      DEPLOYMENT_ENVIRONMENT_NAME: dev
      OTEL_TRACES_EXPORTER: otlp
      OTEL_METRICS_EXPORTER: otlp
      OTEL_LOGS_EXPORTER: otlp
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_EXPORTER_OTLP_METRICS_PROTOCOL: http/protobuf
      OTEL_EXPORTER_OTLP_METRICS_ENDPOINT: http://otel-collector:4318/v1/metrics
      OTEL_INSTRUMENTATION_SERVLET_EXCLUDE_PATTERN: /actuator/.*|/health|/metrics
      OTEL_INSTRUMENTATION_LOGBACK_APPENDER_EXPERIMENTAL_LOG_ATTRIBUTES: "true"
      OTEL_INSTRUMENTATION_LOGBACK_APPENDER_EXPERIMENTAL_CAPTURE_CODE_ATTRIBUTES: "true"
      OTEL_INSTRUMENTATION_LOGBACK_APPENDER_EXPERIMENTAL_CAPTURE_MARKER_ATTRIBUTE: "true"
      OTEL_INSTRUMENTATION_LOGBACK_APPENDER_EXPERIMENTAL_CAPTURE_KEY_VALUE_PAIR_ATTRIBUTES: "true"
      OTEL_INSTRUMENTATION_LOGBACK_APPENDER_EXPERIMENTAL_CAPTURE_MDC_ATTRIBUTES: "*"
    networks:
      - observability
    depends_on:
      - ngrok

  ngrok:
    image: ngrok/ngrok:latest
    container_name: ngrok
    command: http app:8081
    environment:
      NGROK_AUTHTOKEN: ${NGROK_AUTHTOKEN} # opcional, se tiver token
    ports:
      - "4040:4040" # painel web
    networks:
      - observability

networks:
  observability:
    name: observability