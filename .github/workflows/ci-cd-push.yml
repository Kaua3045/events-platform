name: CI/CD Pipeline for Push to Main and Develop

on:
  push:
    branches:
      - main
      - develop

# Precisamos adicionar o sonarqube para SAST, o github dependabot para dependencias e tambem o snyk para as dependencias
# Precisamos adicionar a parte de build e push da imagem docker
jobs:
  build:
    name: Build application
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configuring cache for Gradle
        uses: actions/cache@v4
        with:
          path: ~/.gradle/caches
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: 'temurin'

      - name: Build application
        run: ./gradlew clean build --stacktrace -x test

  test: # Deveriamos ter + 1 job para cada tipo de test (normal, integrastion e end-to-end)
    name: Run Tests
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: 'temurin'

      - name: Run all tests
        run: ./gradlew test --rerun-tasks --stacktrace

  trivy:
    name: Scan Trivy
    runs-on: ubuntu-latest
    needs: build

    permissions:
      security-events: write
      actions: read
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: ~/.gradle/caches
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: "fs"
          format: sarif
          scanners: "vuln,secret,config"
          output: "trivy-java-results.sarif"
          severity: "CRITICAL,HIGH"

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v3
        with:
          category: java-result
          sarif_file: "trivy-java-results.sarif"